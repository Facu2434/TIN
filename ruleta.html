<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ruleta de actividades</title>

<style>

:root{
--bg:#f5f1e8;
--card:#ffffff;
--text:#2d2d2d;
--muted:#666;
--accent:#2a9d8f;
--accent2:#e76f51;
--border:#ddd6c8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
system-ui,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

background:
linear-gradient(
180deg,
#f8f5ef 0%,
#f1ece2 100%
);

color:var(--text);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

}

.container{

width:100%;
max-width:1100px;

background:var(--card);

border-radius:28px;

padding:40px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

border:1px solid var(--border);

text-align:center;

position:relative;

}

h1{

font-size:clamp(2.2rem,5vw,4rem);

margin-bottom:10px;

}

.subtitle{

font-size:1.1rem;

color:var(--muted);

margin-bottom:35px;

}

.wheel{

width:220px;
height:220px;

margin:0 auto 30px;

border-radius:50%;

background:
conic-gradient(
#2a9d8f 0deg 120deg,
#e9c46a 120deg 240deg,
#e76f51 240deg 360deg
);

display:flex;
align-items:center;
justify-content:center;

position:relative;

transition:
transform 4s cubic-bezier(.17,.67,.25,1);

box-shadow:
0 10px 25px rgba(0,0,0,0.12);

}

.wheel::after{

content:"";

width:55px;
height:55px;

background:white;

border-radius:50%;

position:absolute;

}

.pointer{

width:0;
height:0;

border-left:20px solid transparent;
border-right:20px solid transparent;
border-top:35px solid #333;

margin:0 auto 10px;

}

button{

border:none;

padding:16px 28px;

border-radius:16px;

font-size:1rem;

font-weight:700;

cursor:pointer;

transition:0.2s ease;

}

.spin-btn{

background:var(--accent);

color:white;

margin-bottom:35px;

}

.spin-btn:hover{
opacity:0.9;
}

.result{

display:none;

animation:fade 0.4s ease;

}

.result h2{

font-size:2rem;

margin-bottom:20px;

}

.preview{

width:100%;
max-width:700px;

border-radius:18px;

border:1px solid var(--border);

box-shadow:
0 8px 24px rgba(0,0,0,0.08);

margin-bottom:25px;

}

.actions{

display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;

}

.secondary{

background:#ece7dc;
color:#333;

}

.primary{

background:var(--accent2);
color:white;

}

.fullscreen{

position:fixed;

inset:0;

background:rgba(0,0,0,0.92);

display:none;

justify-content:center;
align-items:center;

padding:30px;

z-index:999;

}

.fullscreen img{

max-width:95%;
max-height:95%;

object-fit:contain;

border-radius:14px;

background:white;

}

.close-full{

position:absolute;

top:25px;
right:25px;

background:white;

color:black;

padding:12px 18px;

border-radius:12px;

font-weight:700;

cursor:pointer;

}

.close-index{

position:absolute;

top:20px;
right:20px;

background:#ece7dc;

padding:12px 18px;

border-radius:12px;

font-weight:700;

text-decoration:none;

color:#333;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:700px){

.container{
padding:25px;
}

.wheel{
width:180px;
height:180px;
}

}

</style>
</head>

<body>

<a href="index.html" class="close-index">
Cerrar
</a>

<div class="container">

<h1>
Ruleta de actividades
</h1>

<p class="subtitle">
Girás la ruleta y copiás el modelo que te toque.
</p>

<div class="pointer"></div>

<div class="wheel" id="wheel"></div>

<button class="spin-btn" onclick="spinWheel()">
GIRAR
</button>

<div class="result" id="result">

<h2 id="title"></h2>

<img id="preview" class="preview" src="" alt="preview">

<div class="actions">

<button class="primary" onclick="openFullscreen()">
Ver grande
</button>

<button class="secondary" onclick="spinAgain()">
Volver a girar
</button>

</div>

</div>

</div>

<div class="fullscreen" id="fullscreen">

<button class="close-full" onclick="closeFullscreen()">
Cerrar
</button>

<img id="fullImage" src="" alt="imagen completa">

</div>

<script>

const activities = [

{
title:"ORGANIZADOR SEMANAL",
image:"organizador.png"
},

{
title:"MENÚ",
image:"menu.png"
},

{
title:"FICHA PERSONAL",
image:"ficha.png"
}

];

const wheel = document.getElementById("wheel");
const result = document.getElementById("result");
const title = document.getElementById("title");
const preview = document.getElementById("preview");

let currentImage = "";

function spinWheel(){

result.style.display = "none";

const randomRotation =
3600 + Math.floor(Math.random() * 360);

wheel.style.transform =
`rotate(${randomRotation}deg)`;

const selected =
activities[
Math.floor(Math.random() * activities.length)
];

setTimeout(() => {

title.textContent = `Te tocó: ${selected.title}`;

preview.src = selected.image;

currentImage = selected.image;

result.style.display = "block";

}, 4200);

}

function openFullscreen(){

document.getElementById("fullscreen").style.display = "flex";

document.getElementById("fullImage").src = currentImage;

}

function closeFullscreen(){

document.getElementById("fullscreen").style.display = "none";

}

function spinAgain(){

result.style.display = "none";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

</script>

</body>
</html>
