<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ruleta de actividades</title>

<style>

:root{
--bg:#f5f1e8;
--card:#ffffff;
--text:#2d2d2d;
--muted:#666;
--accent:#2a9d8f;
--accent2:#e76f51;
--border:#ddd6c8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
system-ui,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

background:
linear-gradient(
180deg,
#f8f5ef 0%,
#f1ece2 100%
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

color:var(--text);

}

.container{

width:100%;
max-width:1100px;

background:white;

border-radius:28px;

padding:40px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

border:1px solid var(--border);

text-align:center;

position:relative;

overflow:hidden;

transition:
transform 0.25s ease,
box-shadow 0.25s ease;  

  
}

.container:hover{

transform:
translateY(-6px);

box-shadow:
0 18px 40px rgba(0,0,0,0.12);

}
  
.container::before{

content:"";

position:absolute;

top:0;
left:0;
right:0;

height:6px;

background:
linear-gradient(
90deg,
var(--accent),
var(--accent2)
);

}

.close-btn{

position:absolute;

top:20px;
right:20px;

text-decoration:none;

background:#ece7dc;

padding:12px 18px;

border-radius:12px;

font-weight:700;

color:#333;

transition:0.2s ease;

}

.close-btn:hover{
background:#ddd4c4;
}

h1{

font-size:clamp(2.4rem,5vw,4rem);

margin-bottom:10px;

}

.subtitle{

font-size:1.1rem;

color:var(--muted);

margin-bottom:35px;

}

.pointer{

width:0;
height:0;

border-left:22px solid transparent;
border-right:22px solid transparent;
border-top:36px solid #333;

margin:0 auto 12px;

}

.wheel{

width:240px;
height:240px;

margin:0 auto 35px;

border-radius:50%;

background:
conic-gradient(
#2a9d8f 0deg 120deg,
#e9c46a 120deg 240deg,
#e76f51 240deg 360deg
);

display:flex;
justify-content:center;
align-items:center;

position:relative;

box-shadow:
0 12px 26px rgba(0,0,0,0.14);

}

.wheel::after{

content:"";

width:60px;
height:60px;

background:white;

border-radius:50%;

position:absolute;

}

.spin-btn{

border:none;

padding:16px 28px;

border-radius:16px;

background:var(--accent);

color:white;

font-size:1rem;

font-weight:700;

cursor:pointer;

transition:0.2s ease;

margin-bottom:35px;

}

.spin-btn:hover{
opacity:0.9;
}

.result{

display:none;

animation:fade 0.35s ease;

}

.result h2{

font-size:2rem;

margin-bottom:20px;

}

.preview{

width:100%;
max-width:850px;

border-radius:18px;

border:1px solid var(--border);

box-shadow:
0 8px 24px rgba(0,0,0,0.08);

margin-bottom:25px;

cursor:pointer;

transition:0.2s ease;

}

.preview:hover{
transform:scale(1.01);
}

.actions{

display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;

}

.action-btn{

border:none;

padding:14px 22px;

border-radius:14px;

font-size:1rem;

font-weight:700;

cursor:pointer;

transition:0.2s ease;

}

.primary{
background:var(--accent2);
color:white;
}

.secondary{
background:#ece7dc;
color:#333;
}

.action-btn:hover{
opacity:0.92;
}

.fullscreen{

position:fixed;

inset:0;

background:rgba(0,0,0,0.95);

display:none;

overflow:auto;

padding:40px;

z-index:999;

text-align:center;

}

.fullscreen img{

width:auto;
height:auto;

max-width:none;
max-height:none;

border-radius:14px;

background:white;

box-shadow:
0 10px 30px rgba(0,0,0,0.4);

}

.close-full{

position:fixed;

top:20px;
right:20px;

border:none;

background:white;

padding:12px 18px;

border-radius:12px;

font-weight:700;

cursor:pointer;

z-index:1000;

}

.tip{

margin-top:18px;

font-size:0.95rem;

color:#ccc;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:700px){

.container{
padding:25px;
}

.wheel{
width:190px;
height:190px;
}

.preview{
max-width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="close-btn">
Cerrar
</a>

<h1>
Ruleta de actividades
</h1>

<p class="subtitle">
Girás la ruleta y copiás el modelo que te toque.
</p>

<div class="pointer"></div>

<div class="wheel" id="wheel"></div>

<button class="spin-btn" onclick="spinWheel()">
GIRAR
</button>

<div class="result" id="result">

<h2 id="title"></h2>

<img
id="preview"
class="preview"
src=""
alt="preview"
onclick="openFullscreen()"
>

<div class="actions">

<button
class="action-btn primary"
onclick="openFullscreen()">
Ver grande
</button>

<button
class="action-btn secondary"
onclick="spinAgain()">
Volver a girar
</button>

</div>

</div>

</div>

<div class="fullscreen" id="fullscreen">

<button
class="close-full"
onclick="closeFullscreen()">
Cerrar
</button>

<img id="fullImage" src="" alt="imagen">

<p class="tip">
Usá el zoom del navegador si necesitás agrandar más la imagen.
</p>

</div>

<script>

const activities = [

{
title:"ORGANIZADOR SEMANAL",
image:"organizador.png"
},

{
title:"MENÚ",
image:"menu.png"
},

{
title:"FICHA PERSONAL",
image:"ficha.png"
}

];

const wheel =
document.getElementById("wheel");

const result =
document.getElementById("result");

const title =
document.getElementById("title");

const preview =
document.getElementById("preview");

let currentImage = "";

function spinWheel(){

result.style.display = "none";

wheel.style.transition = "none";
wheel.style.transform = "rotate(0deg)";

void wheel.offsetWidth;

wheel.style.transition =
"transform 4s cubic-bezier(.17,.67,.25,1)";

const randomRotation =
3600 + Math.floor(Math.random() * 360);

wheel.style.transform =
`rotate(${randomRotation}deg)`;

const selected =
activities[
Math.floor(Math.random() * activities.length)
];

setTimeout(() => {

title.textContent =
`Te tocó: ${selected.title}`;

preview.src = selected.image;

currentImage = selected.image;

result.style.display = "block";

}, 4100);

}

function openFullscreen(){

document.getElementById("fullscreen")
.style.display = "block";

document.getElementById("fullImage")
.src = currentImage;

}

function closeFullscreen(){

document.getElementById("fullscreen")
.style.display = "none";

}

function spinAgain(){

result.style.display = "none";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

</script>

</body>
</html>
